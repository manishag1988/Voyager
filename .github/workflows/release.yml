name: 'Release Tauri App'

on:
  push:
    tags:
      - 'v*' # This triggers the workflow when you push a tag like 'v1.0.0'

jobs:
  release:
    permissions:
      contents: write # Needed to create the GitHub release
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-20.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Under the hood, Rust handles much of its own caching, but we use this action to cache the actual compilation artifacts to heavily speed up Tauri builds.
      - name: Cache rust workspaces
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin, x86_64-apple-darwin' || '' }}

      # Linux requires specific system dependencies to compile Tauri
      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Sync Version from Git Tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync('package.json')); p.version = '$VERSION'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)); const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json')); t.package.version = '$VERSION'; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));"

      # We run `npm run build` so Vite compiles our HTML/JS/CSS assets
      - name: Build Frontend
        run: npm run build

      - name: Extract Release Notes
        shell: bash
        run: |
          awk "/## \[${{ github.ref_name }}\]/{flag=1;next}/## \[/{flag=0}flag" CHANGELOG.md > RELEASENOTES.md

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # The action automatically replaces __VERSION__ with the app version
          releaseName: 'Voyager App v__VERSION__'
          releaseBody: 'Latest changes from CHANGELOG.md'
          bodyPath: RELEASENOTES.md
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}

  pwa-release:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Sync Version from Git Tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync('package.json')); p.version = '$VERSION'; fs.writeFileSync('package.json', JSON.stringify(p, null, 2)); const t = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json')); t.package.version = '$VERSION'; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(t, null, 2));"

      - name: Build Frontend
        run: npm run build

      - name: Zip PWA Web App
        run: |
          cd dist
          tar -czvf ../Voyager_PWA_${{ github.ref_name }}.tar.gz .

      - name: Extract Release Notes
        shell: bash
        run: |
          awk "/## \[${{ github.ref_name }}\]/{flag=1;next}/## \[/{flag=0}flag" CHANGELOG.md > RELEASENOTES.md

      - name: Upload PWA to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Voyager_PWA_${{ github.ref_name }}.tar.gz
          body_path: RELEASENOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

