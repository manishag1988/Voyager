name: 'Release Tauri App'

on:
  push:
    tags:
      - 'v*' # This triggers the workflow when you push a tag like 'v1.0.0'

jobs:
  release:
    permissions:
      contents: write # Needed to create the GitHub release
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-20.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Under the hood, Rust handles much of its own caching, but we use this action to cache the actual compilation artifacts to heavily speed up Tauri builds.
      - name: Cache rust workspaces
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Linux requires specific system dependencies to compile Tauri
      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      # We run `npm run build` so Vite compiles our HTML/JS/CSS assets
      - name: Build Frontend
        run: npm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # The action automatically replaces __VERSION__ with the app version
          releaseName: 'Voyager App v__VERSION__'
          releaseBody: 'See the attached assets for the latest installers.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target aarch64-apple-darwin --target x86_64-apple-darwin' || '' }}
